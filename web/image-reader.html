<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DTL Chapter Reader Lab</title>
  <style>
    :root {
      --ink: #18202f;
      --muted: #687385;
      --line: #d9e0ea;
      --back: #eef2f7;
      --panel: #ffffff;
      --blue: #154889;
      --red: #a91d2a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--back);
      color: var(--ink);
      font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
    }

    h1 {
      margin: 0;
      overflow: hidden;
      font-size: 16px;
      font-weight: 750;
      letter-spacing: 0;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    button {
      min-width: 40px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--blue);
      cursor: pointer;
      font: inherit;
      font-weight: 750;
    }

    button:disabled {
      color: var(--muted);
      cursor: not-allowed;
      opacity: 0.55;
    }

    .page-count {
      min-width: 86px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
    }

    main {
      min-height: calc(100vh - 60px);
      padding: 18px 12px 34px;
    }

    .reader-stage {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .page-frame {
      width: min(100%, 980px);
      min-height: 64vh;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 8px 28px rgba(18, 31, 52, 0.12);
    }

    .page-frame img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .status {
      max-width: 680px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }

    .status.error {
      color: var(--red);
    }

    @media (max-width: 640px) {
      header {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: space-between;
        width: 100%;
      }

      main {
        padding: 10px 0 24px;
      }

      .page-frame {
        border-left: 0;
        border-right: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="chapterTitle">Chapter Reader</h1>
    <div class="toolbar" aria-label="Page navigation">
      <button id="previousPage" type="button" aria-label="Previous page">&lt;</button>
      <span id="pageCount" class="page-count">Page - of -</span>
      <button id="nextPage" type="button" aria-label="Next page">&gt;</button>
    </div>
  </header>

  <main>
    <div class="reader-stage">
      <div id="pageFrame" class="page-frame">
        <p id="status" class="status">Loading chapter...</p>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const workerUrl = (params.get("worker") || "https://dtl-chapter-reader-dropbox-lab.reference-dfe.workers.dev").replace(/\/+$/, "");
    const token = params.get("token") || "";

    const titleEl = document.getElementById("chapterTitle");
    const pageCountEl = document.getElementById("pageCount");
    const frameEl = document.getElementById("pageFrame");
    const statusEl = document.getElementById("status");
    const previousButton = document.getElementById("previousPage");
    const nextButton = document.getElementById("nextPage");

    let manifest = null;
    let currentPage = 1;
    let currentImageUrl = "";

    function setStatus(message, isError = false) {
      if (currentImageUrl) {
        URL.revokeObjectURL(currentImageUrl);
        currentImageUrl = "";
      }
      frameEl.innerHTML = "";
      statusEl.textContent = message;
      statusEl.className = "status" + (isError ? " error" : "");
      frameEl.appendChild(statusEl);
    }

    function updateControls() {
      const pageCount = manifest ? manifest.pageCount : 0;
      pageCountEl.textContent = pageCount ? `Page ${currentPage} of ${pageCount}` : "Page - of -";
      previousButton.disabled = !pageCount || currentPage <= 1;
      nextButton.disabled = !pageCount || currentPage >= pageCount;
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "The chapter could not be opened.");
      }
      return data;
    }

    async function loadManifest() {
      if (!token) {
        throw new Error("This reader link is missing its access token.");
      }
      const url = new URL(workerUrl + "/chapter-manifest");
      url.searchParams.set("token", token);
      manifest = await fetchJson(url);
      titleEl.textContent = manifest.title || "Chapter Reader";
      currentPage = 1;
      updateControls();
    }

    async function loadPage(page) {
      setStatus("Loading page...");
      updateControls();

      const url = new URL(workerUrl + "/chapter-page");
      url.searchParams.set("token", token);
      url.searchParams.set("page", String(page));

      const response = await fetch(url);
      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        throw new Error(data.error || "This page could not be loaded.");
      }

      const blob = await response.blob();
      if (!blob.type.startsWith("image/")) {
        throw new Error("The server did not return a page image.");
      }

      if (currentImageUrl) {
        URL.revokeObjectURL(currentImageUrl);
      }
      currentImageUrl = URL.createObjectURL(blob);

      const image = document.createElement("img");
      image.alt = `Page ${page}`;
      image.draggable = false;
      image.src = currentImageUrl;
      frameEl.innerHTML = "";
      frameEl.appendChild(image);
      currentPage = page;
      updateControls();
    }

    previousButton.addEventListener("click", () => {
      if (manifest && currentPage > 1) {
        loadPage(currentPage - 1).catch(error => setStatus(error.message, true));
      }
    });

    nextButton.addEventListener("click", () => {
      if (manifest && currentPage < manifest.pageCount) {
        loadPage(currentPage + 1).catch(error => setStatus(error.message, true));
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") {
        previousButton.click();
      } else if (event.key === "ArrowRight") {
        nextButton.click();
      }
    });

    loadManifest()
      .then(() => loadPage(1))
      .catch(error => {
        updateControls();
        setStatus(error.message, true);
      });
  </script>
</body>
</html>
