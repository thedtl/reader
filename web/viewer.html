<!-- BACK BUTTON TRAP (V2: ALWAYS ARM + BEFOREUNLOAD FALLBACK) -->
<script>
(function () {
  "use strict";

  // =============================================================
  // DTL BACK BUTTON PROTECTION
  // Strategy:
  // 1. ALWAYS show gesture gate on page load (creates fresh history buffer)
  // 2. beforeunload fires as fallback if user tries to leave
  // 3. popstate catches back button and shows session ended overlay
  // =============================================================

  // DTL palette
  const DTL_BLUE = "#154889";
  const DTL_BLUE_HOVER = "#123F79";
  const DTL_RED = "#AF161C";
  const TEXT = "#1f2937";
  const MUTED = "#6b7280";

  const SESSION_KEY = "dtlTrapArmed";
  const BUFFER_STATES = 200; // how many Back presses to absorb

  // Track if trap is armed THIS page load (not just sessionStorage)
  let trapArmedThisSession = false;

  function isArmed() {
    return trapArmedThisSession;
  }

  // Clear stale sessionStorage on page load (history buffer doesn't persist)
  try {
    sessionStorage.removeItem(SESSION_KEY);
  } catch (e) {}

  // =============================================================
  // BEFOREUNLOAD FALLBACK
  // This fires when user tries to leave the page by ANY means
  // Shows browser-native "Leave site?" dialog
  // =============================================================
  function enableBeforeUnload() {
    window.addEventListener("beforeunload", function (e) {
      if (!isArmed()) return;
      
      // Standard way to trigger the dialog
      e.preventDefault();
      // Legacy browsers need returnValue set
      e.returnValue = "";
      return "";
    });
    console.log("[DTL] beforeunload fallback enabled");
  }

  // =============================================================
  // SESSION ENDED OVERLAY
  // =============================================================
  function showSessionEndedOverlay() {
    if (document.getElementById("dtl-session-ended-overlay")) return;

    const overlay = document.createElement("div");
    overlay.id = "dtl-session-ended-overlay";
    overlay.style.cssText =
      "position:fixed;inset:0;z-index:2147483647;" +
      "background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;" +
      "font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px;";

    overlay.innerHTML =
      '<div style="background:white;max-width:460px;width:100%;border-radius:16px;padding:38px 30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);">' +
        '<div style="font-size:56px;margin-bottom:14px;">🔒</div>' +
        '<div style="font-size:22px;font-weight:800;color:' + TEXT + ';margin-bottom:10px;">Session Ended</div>' +
        '<div style="color:' + MUTED + ';line-height:1.6;margin-bottom:18px;">Your viewing session has ended. For copyright protection, you cannot return to the previous page.</div>' +
        '<button id="dtl-session-return" style="width:100%;padding:14px 18px;border:0;border-radius:10px;background:' + DTL_BLUE + ';color:white;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:12px;">📖 Return to Chapter</button>' +
        '<div style="display:flex;flex-direction:column;gap:12px;margin-top:6px;">' +
          '<a href="https://libguides.thedtl.org/home" style="display:block;padding:14px 18px;border-radius:10px;background:' + DTL_RED + ';color:white;text-decoration:none;font-weight:800;">📖 DTL Catalog</a>' +
          '<a href="https://dtl2.libguides.com/home" style="display:block;padding:14px 18px;border-radius:10px;background:' + DTL_BLUE + ';color:white;text-decoration:none;font-weight:800;">📚 DTL2 Catalog</a>' +
        "</div>" +
        '<div style="color:#9ca3af;font-size:12px;margin-top:14px;line-height:1.5;">Need help? Contact your librarian for assistance.</div>' +
      "</div>";

    document.body.appendChild(overlay);
    
    // Add click handler for Return to Chapter button
    const returnBtn = document.getElementById("dtl-session-return");
    if (returnBtn) {
      returnBtn.addEventListener("click", function() {
        overlay.remove();
      });
      returnBtn.addEventListener("mouseenter", function() {
        returnBtn.style.background = DTL_BLUE_HOVER;
      });
      returnBtn.addEventListener("mouseleave", function() {
        returnBtn.style.background = DTL_BLUE;
      });
    }
  }

  // =============================================================
  // ARM TRAP WITH USER GESTURE
  // Safari requires user gesture to reliably push history states
  // =============================================================
  function armTrapWithGesture() {
    try {
      // Get base URL without any existing hash
      const baseUrl = location.href.split('#')[0];
      
      // Establish a base state
      history.replaceState({ dtlTrap: true, i: 0 }, "", baseUrl + '#dtl0');

      // Push a buffer of states with unique hashes
      // Firefox requires distinct URLs to enable the back button
      for (let i = 1; i <= BUFFER_STATES; i++) {
        history.pushState({ dtlTrap: true, i }, "", baseUrl + '#dtl' + i);
      }

      trapArmedThisSession = true;
      sessionStorage.setItem(SESSION_KEY, "1");
      
      // Enable beforeunload as backup
      enableBeforeUnload();
      
      console.log("[DTL] Back trap armed with buffer:", BUFFER_STATES);
    } catch (e) {
      console.warn("[DTL] Failed to arm trap:", e);
      // Even if history fails, enable beforeunload
      trapArmedThisSession = true;
      enableBeforeUnload();
    }
  }

  // =============================================================
  // POPSTATE HANDLER
  // =============================================================
  
  // Detect Firefox (handles history differently during popstate)
  const isFirefox = typeof navigator !== 'undefined' && 
    /Firefox/i.test(navigator.userAgent);
  
  function handlePopState(evt) {
    if (!isArmed()) return;

    console.log("[DTL] popstate fired, showing session ended.");
    showSessionEndedOverlay();
    
    // Push user forward in the history buffer
    // Firefox needs a delay to properly render the overlay before history manipulation
    if (isFirefox) {
      // In Firefox, delay history restoration to ensure overlay renders
      setTimeout(function() {
        try {
          history.go(BUFFER_STATES);
        } catch (e) {}
      }, 50);
    } else {
      try {
        history.go(BUFFER_STATES);
      } catch (e) {}
    }
  }

  window.addEventListener("popstate", handlePopState);

  // =============================================================
  // BFCACHE HANDLER (Safari)
  // =============================================================
  window.addEventListener("pageshow", function (event) {
    if (event && event.persisted) {
      console.log("[DTL] Restored from bfcache");
      // If we were armed before bfcache, show overlay
      try {
        if (sessionStorage.getItem(SESSION_KEY) === "1") {
          showSessionEndedOverlay();
        }
      } catch (e) {}
    }
  });

  // =============================================================
  // GESTURE GATE
  // ALWAYS shows on page load to create fresh history buffer
  // =============================================================
  function showGestureGate() {
    // Remove any existing gate (safety)
    const existing = document.getElementById("dtl-gesture-gate");
    if (existing) existing.remove();

    const gate = document.createElement("div");
    gate.id = "dtl-gesture-gate";
    gate.style.cssText =
      "position:fixed;inset:0;z-index:2147483647;" +
      "background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;" +
      "font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px;" +
      "opacity:0;transition:opacity 0.2s ease;";

    gate.innerHTML =
      '<div style="background:white;max-width:460px;width:100%;border-radius:16px;padding:34px 28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);transform:scale(0.95);transition:transform 0.2s ease;" id="dtl-gate-card">' +
        '<div style="font-size:52px;margin-bottom:14px;">📖</div>' +
        '<div style="font-size:22px;font-weight:800;color:' + TEXT + ';margin-bottom:10px;">Start Reading</div>' +
        '<div style="color:' + MUTED + ';line-height:1.6;margin-bottom:18px;">Click below to begin your secure viewing session.</div>' +
        '<button id="dtl-start-reading" style="width:100%;padding:14px 18px;border:0;border-radius:10px;background:' + DTL_BLUE + ';color:white;font-weight:800;font-size:15px;cursor:pointer;transition:background 0.15s ease;">Begin Session</button>' +
        '<div style="color:#9ca3af;font-size:12px;margin-top:12px;line-height:1.5;">Using the browser back button will end your session.</div>' +
        '<div style="color:#9ca3af;font-size:11px;margin-top:8px;line-height:1.4;font-style:italic;">Firefox users: The back button may appear disabled for copyright protection.</div>' +
      "</div>";

    function attach() {
      document.body.appendChild(gate);
      
      // Trigger fade in
      requestAnimationFrame(function() {
        gate.style.opacity = "1";
        const card = gate.querySelector("#dtl-gate-card");
        if (card) card.style.transform = "scale(1)";
      });

      const btn = gate.querySelector("#dtl-start-reading");
      if (btn) {
        btn.addEventListener(
          "click",
          function () {
            // Arm the trap with this user gesture
            armTrapWithGesture();
            
            // Fade out
            gate.style.opacity = "0";
            const card = gate.querySelector("#dtl-gate-card");
            if (card) card.style.transform = "scale(0.95)";
            
            setTimeout(function () {
              gate.remove();
            }, 200);
          },
          { once: true }
        );
        
        btn.addEventListener("mouseenter", function () {
          btn.style.background = DTL_BLUE_HOVER;
        });
        btn.addEventListener("mouseleave", function () {
          btn.style.background = DTL_BLUE;
        });
      }
    }

    if (document.body) attach();
    else document.addEventListener("DOMContentLoaded", attach, { once: true });
  }

  // =============================================================
  // INITIALIZE
  // Always show gesture gate on page load
  // =============================================================
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", showGestureGate, { once: true });
  } else {
    showGestureGate();
  }
})();
</script>

              <div id="addSignatureControls">

                <div id="addSignatureSaveContainer"><input type="checkbox" id="addSignatureSaveCheckbox" /><label for="addSignatureSaveCheckbox" data-l10n-id="pdfjs-editor-add-signature-save-checkbox"></label><span></span><span id="addSignatureSaveWarning" data-l10n-id="pdfjs-editor-add-signature-save-warning-message"></span></div>

            <div id="editSignatureDescriptionAndView"><div id="editSignatureDescriptionContainer"><label for="editSignatureDescInput" data-l10n-id="pdfjs-editor-add-signature-description-label"></label><span id="editSignatureDescription" class="inputWithClearButton"><input id="editSignatureDescInput" type="text" data-l10n-id="pdfjs-editor-add-signature-description-input" tabindex="0" /><button class="clearInputButton" type="button" tabindex="0" aria-hidden="true"></button></span></div><svg id="editSignatureView" xmlns="http://www.w3.org/2000/svg"></svg></div>
            <div class="dialogButtonsGroup"><button id="editSignatureCancelButton" type="button" class="secondaryButton" tabindex="0"><span data-l10n-id="pdfjs-editor-add-signature-cancel-button"></span></button><button id="editSignatureUpdateButton" type="button" class="primaryButton" disabled tabindex="0"><span data-l10n-id="pdfjs-editor-edit-signature-update-button"></span></button></div>

          <div class="mainContainer">
            <div class="title" id="commentManagerToolbar"><span id="commentManagerTitle" role="sectionhead" data-l10n-id="pdfjs-editor-edit-comment-dialog-title-when-adding"></span></div>
            <textarea id="commentManagerTextInput" data-l10n-id="pdfjs-editor-edit-comment-dialog-text-input" tabindex="0"></textarea>
            <div class="dialogButtonsGroup"><button id="commentManagerCancelButton" type="button" class="secondaryButton" tabindex="0"><span data-l10n-id="pdfjs-editor-edit-comment-dialog-cancel-button"></span></button><button id="commentManagerSaveButton" type="button" class="primaryButton" disabled tabindex="0"><span data-l10n-id="pdfjs-editor-edit-comment-dialog-save-button-when-adding"></span></button></div>

        <dialog id="printServiceDialog" style="min-width: 200px">
          <div class="row"><span data-l10n-id="pdfjs-print-progress-message"></span></div>
          <div class="row"><progress value="0" max="100"></progress><span data-l10n-id="pdfjs-print-progress-percent" data-l10n-args='{ "progress": 0 }' class="relative-progress">0%</span></div>

      <div id="editorUndoBar" class="messageBar" role="status" aria-labelledby="editorUndoBarMessage" tabindex="-1" hidden>
        <div>
          <div><span id="editorUndoBarMessage" class="description"></span></div>
          <button id="editorUndoBarUndoButton" class="undoButton" type="button" tabindex="0" data-l10n-id="pdfjs-editor-undo-bar-undo-button"><span data-l10n-id="pdfjs-editor-undo-bar-undo-button-label"></span></button>
          <button id="editorUndoBarCloseButton" class="closeButton" type="button" tabindex="0" data-l10n-id="pdfjs-editor-undo-bar-close-button"><span data-l10n-id="pdfjs-editor-undo-bar-close-button-label"></span></button>

    <!-- =========================================================
         DTL CHAPTER VIEWER - SECURE TOKEN-BASED ACCESS
         ========================================================= -->
    <script>
    (function() {
        'use strict';
        
        // =============================================================
        // FRIENDLY ERROR PAGE
        // =============================================================
        function showErrorPage(icon, title, message) {
            document.documentElement.innerHTML = '\
                <head>\
                    <title>' + title + ' | Digital Theological Library</title>\
                    <meta name="viewport" content="width=device-width, initial-scale=1">\
                    <style>\
                        * { box-sizing: border-box; margin: 0; padding: 0; }\
                        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); padding: 20px; }\
                        .card { background: white; padding: 48px 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; max-width: 420px; width: 100%; }\
                        .icon { font-size: 56px; margin-bottom: 20px; }\
                        h1 { margin: 0 0 12px 0; color: #1f2937; font-size: 24px; font-weight: 700; }\
                        .message { color: #6b7280; margin: 0 0 28px 0; line-height: 1.6; }\
                        .links { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }\
                        .btn { display: block; padding: 14px 24px; color: white; text-decoration: none; border-radius: 8px; font-weight: 800; text-align: center; }\
                        .btn-primary { background: #AF161C; }\
                        .btn-secondary { background: #154889; }\
                        .help { font-size: 13px; color: #9ca3af; }\
                    </style>\
                </head>\
                <body>\
                    <div class="card">\
                        <div class="icon">' + icon + '</div>\
                        <h1>' + title + '</h1>\
                        <p class="message">' + message + '</p>\
                        <div class="links">\
                            <a href="https://libguides.thedtl.org/home" class="btn btn-primary">📖 DTL Catalog</a>\
                            <a href="https://dtl2.libguides.com/home" class="btn btn-secondary">📚 DTL2 Catalog</a>\
                        </div>\
                        <p class="help">Need help? Contact your librarian for assistance.</p>\
                    </div>\
                </body>';
            window.stop();
        }

        // =============================================================
        // TOKEN HELPERS
        // =============================================================
        function decodeToken(token) {
            if (!token) return null;
            try {
                var parts = token.split('.');
                if (parts.length < 2) return null;
                var base64 = parts[0].replace(/-/g, '+').replace(/_/g, '/');
                while (base64.length % 4) base64 += '=';
                var bytes = new Uint8Array(atob(base64).split('').map(function(c) { return c.charCodeAt(0); }));
                return JSON.parse(new TextDecoder().decode(bytes));
            } catch (e) { return null; }
        }

        function extractTokenFromFile(fileParam) {
            if (!fileParam) return null;
            try {
                var decoded = decodeURIComponent(fileParam);
                return new URL(decoded, location.href).searchParams.get("token");
            } catch (e) {
                try { return new URL(fileParam, location.href).searchParams.get("token"); } 
                catch (e2) { return null; }
            }
        }

        // =============================================================
        // CONFIGURATION
        // =============================================================
        var ALLOWED_HOSTS = ["thedtl.org", "thedtl.github.io", "oclc.org", "libapps.com", "libguides.com", "springshare.com", "localhost", "127.0.0.1"];
        var isLocalDev = ['localhost', '127.0.0.1'].indexOf(location.hostname) !== -1;

        // =============================================================
        // PARSE TOKEN FROM URL
        // Parse before access checks so access validation and diagnostics
        // can rely on the same token state.
        // =============================================================
        var urlParams = new URLSearchParams(window.location.search);
        var token = urlParams.get('token');
        var fileParam = urlParams.get('file');
        if (!token && fileParam) token = extractTokenFromFile(fileParam);

        var payload = token ? decodeToken(token) : null;

        // =============================================================
        // SECURITY CHECK: REFERRER, TOKEN & NEW TAB/WINDOW DETECTION
        // =============================================================
        var referrer = document.referrer || "";
        if (!referrer && window.location.ancestorOrigins && window.location.ancestorOrigins.length > 0) {
            referrer = window.location.ancestorOrigins[window.location.ancestorOrigins.length - 1];
        }

        // Diagnostic only. Do not use history.length as a blocking signal.
        // Firefox can report history.length === 2 for a normal same-tab click,
        // so using <= 2 creates false "New Tab/Window Not Allowed" blocks.
        try {
            console.log('[DTL] Access check:', {
                browser: navigator.userAgent,
                referrer: referrer,
                ancestorOrigins: window.location.ancestorOrigins ? Array.from(window.location.ancestorOrigins) : [],
                historyLength: window.history.length,
                hasToken: !!token,
                tokenDecoded: !!payload,
                location: window.location.href
            });
        } catch (e) {}

        // Direct access/new-tab loads often have no referrer. This is a much
        // stronger signal than history.length and avoids the Firefox false positive.
        if (!referrer && !isLocalDev) {
            showErrorPage('🚫', 'New Tab/Window Not Allowed', 'For copyright protection, this resource cannot be opened directly. Please click the link from the chapter list.');
            throw new Error("Access Denied: No Referrer");
        }

        // Check if referrer is from an allowed source.
        var isAllowedReferrer = isLocalDev || ALLOWED_HOSTS.some(function(host) {
            try {
                var refHost = new URL(referrer).hostname;
                return refHost === host || refHost.endsWith('.' + host);
            } catch (e) {
                return false;
            }
        });

        if (!isAllowedReferrer) {
            showErrorPage('🔗', 'Invalid Link Source', 'This resource must be accessed through the library website.');
            throw new Error("Access Denied: Invalid Referrer");
        }

        // Token-based access should fail closed. This prevents a copied URL
        // without a valid token from becoming an unrestricted full-document viewer.
        if ((!token || !payload) && !isLocalDev) {
            showErrorPage('🔐', 'Invalid Access Token', 'This secure viewing link is missing or invalid. Please return to the chapter list and open the resource again.');
            throw new Error("Access Denied: Missing or invalid token");
        }

        window.DTL_prepareReaderFileUrl = async function(fileUrl) {
            if (!token) {
                return fileUrl;
            }

            var pdfUrl;
            try {
                pdfUrl = new URL(fileUrl, location.href);
            } catch (e) {
                return fileUrl;
            }

            if (!pdfUrl.searchParams.get('token')) {
                return fileUrl;
            }

            try {
                var sessionUrl = new URL('/reader-session', pdfUrl.origin);
                sessionUrl.searchParams.set('token', token);

                var response = await fetch(sessionUrl.toString(), {
                    method: 'GET',
                    cache: 'no-store',
                    credentials: 'omit'
                });
                var data = await response.json().catch(function() { return {}; });
                if (!response.ok || !data.session) {
                    throw new Error(data.error || 'The reading session could not be started.');
                }

                pdfUrl.searchParams.set('session', data.session);
                return pdfUrl.toString();
            } catch (e) {
                showErrorPage('🔐', 'Reader Session Needed', e.message || 'Please return to the chapter list and open this chapter again.');
                throw e;
            }
        };
        
        // Store config globally
        window.DTL_CHAPTER = {
            chapterStart: payload && payload.s ? payload.s : null,
            chapterEnd: payload && payload.e ? payload.e : null,
            chapterName: payload && payload.c ? payload.c : null,
            allowDownload: payload && payload.d === 1,
            totalPages: null,
            isRestricted: payload && payload.s != null && payload.e != null
        };

        console.log('[DTL] Chapter config:', window.DTL_CHAPTER);

        // =============================================================
        // HIDE EDITOR TOOLS (Always)
        // =============================================================
        var hideEditorTools = function() {
            ['#editorModeButtons', '#editorModeSeparator', '#editorHighlight', '#editorFreeText', '#editorInk', '#editorStamp', '#editorComment', '#editorSignature'].forEach(function(sel) {
                var el = document.querySelector(sel);
                if (el) el.style.display = 'none';
            });
        };
        hideEditorTools();
        setTimeout(hideEditorTools, 500);
        setTimeout(hideEditorTools, 1500);

        // =============================================================
        // DOWNLOAD/PRINT RESTRICTIONS
        // =============================================================
        var applyDownloadRestrictions = function() {
            var show = window.DTL_CHAPTER.allowDownload;
            ['#downloadButton', '#printButton', '#secondaryDownload', '#secondaryPrint', '#secondaryOpenFile'].forEach(function(sel) {
                var el = document.querySelector(sel);
                if (el) el.style.display = show ? '' : 'none';
            });
        };
        applyDownloadRestrictions();
        setTimeout(applyDownloadRestrictions, 500);
        setTimeout(applyDownloadRestrictions, 1500);
        
        // Block keyboard shortcuts if downloads not allowed
        if (!window.DTL_CHAPTER.allowDownload) {
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && ['s', 'p', 'o', 'u'].indexOf(e.key.toLowerCase()) !== -1) {
                    e.preventDefault(); e.stopPropagation(); return false;
                }
            }, true);
        }
        
        // Always block right-click (prevents "Open in new tab" option)
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); }, true);

        // =============================================================
        // BLOCK OPENING LINKS IN NEW TAB
        // =============================================================
        function getClickedLink(target) {
            if (!target || typeof target.closest !== 'function') return null;
            return target.closest('a[href], area[href]');
        }

        // Block middle-click on links, which opens links in a new tab.
        document.addEventListener('auxclick', function(e) {
            if (e.button === 1 && getClickedLink(e.target)) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        }, true);

        // Block Ctrl+click, Cmd+click, Shift+click, and Alt+click on links.
        document.addEventListener('click', function(e) {
            if (getClickedLink(e.target) && (e.ctrlKey || e.metaKey || e.shiftKey || e.altKey)) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        }, true);

        // Disable dragging links to a new tab without blocking all non-link dragging.
        document.addEventListener('dragstart', function(e) {
            if (getClickedLink(e.target)) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        }, true);

        // =============================================================
        // END OF CHAPTER CARD
        // =============================================================
        var endCardShowing = false;
        
        function showEndCard(reason) {
            if (endCardShowing || document.getElementById('dtl-chapter-end-card')) return;
            endCardShowing = true;
            
            var c = window.DTL_CHAPTER;
            var isStart = reason === 'start';
            var title = isStart ? 'Start of Chapter' : 'End of Chapter';
            var message = isStart 
                ? 'You are at the beginning of your selected chapter.'
                : (c.chapterName ? 'You\'ve reached the end of "' + c.chapterName + '".' : 'You\'ve reached the end of this chapter.');
            
            var card = document.createElement('div');
            card.id = 'dtl-chapter-end-card';
            card.innerHTML = '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;justify-content:center;align-items:center;z-index:99999;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;padding:20px;"><div style="background:white;padding:40px;border-radius:16px;text-align:center;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);"><div style="font-size:48px;margin-bottom:16px;">📖</div><h2 style="margin:0 0 12px 0;color:#1f2937;font-size:24px;">' + title + '</h2><p style="color:#6b7280;margin:0 0 24px 0;line-height:1.6;">' + message + '</p><button id="dtl-end-card-close" style="padding:14px 18px;background:#154889;color:white;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:20px;width:100%;">Return to Chapter</button><div style="border-top:1px solid #eee;padding-top:20px;"><p style="color:#9ca3af;font-size:13px;margin-bottom:12px;">Looking for more? Browse our catalogs:</p><div style="display:flex;flex-direction:column;gap:12px;"><a href="https://libguides.thedtl.org/home" target="_blank" style="display:block;padding:14px 18px;border-radius:10px;background:#AF161C;color:white;text-decoration:none;font-weight:800;">📖 DTL Catalog</a><a href="https://dtl2.libguides.com/home" target="_blank" style="display:block;padding:14px 18px;border-radius:10px;background:#154889;color:white;text-decoration:none;font-weight:800;">📚 DTL2 Catalog</a></div></div></div></div>';
            document.body.appendChild(card);
            document.getElementById('dtl-end-card-close').onclick = function() { card.remove(); endCardShowing = false; };
        }

        // =============================================================
        // MAIN: APPLY CHAPTER RESTRICTIONS AFTER PDF LOADS
        // =============================================================
        function enforceChapterRestrictions() {
            var checkReady = setInterval(function() {
                if (window.PDFViewerApplication && window.PDFViewerApplication.pdfDocument) {
                    clearInterval(checkReady);
                    
                    var app = window.PDFViewerApplication;
                    var pdfDoc = app.pdfDocument;
                    var totalPages = pdfDoc.numPages;
                    window.DTL_CHAPTER.totalPages = totalPages;

                    // Neuter easy extraction methods
                    try {
                        pdfDoc.getData = function() { return Promise.reject(new Error('Access denied')); };
                        pdfDoc.saveDocument = function() { return Promise.reject(new Error('Access denied')); };
                    } catch (e) {}

                    // Only apply restrictions if we have chapter bounds
                    if (!window.DTL_CHAPTER.isRestricted) {
                        console.log('[DTL] No chapter restrictions - full PDF access');
                        return;
                    }

                    var c = window.DTL_CHAPTER;
                    var validStart = Math.max(1, Math.min(c.chapterStart, totalPages));
                    var validEnd = Math.max(validStart, Math.min(c.chapterEnd, totalPages));
                    c.chapterStart = validStart;
                    c.chapterEnd = validEnd;
                    var chapterLength = validEnd - validStart + 1;

                    // Jump to chapter start
                    app.page = validStart;

                    // Page display helpers
                    var pageInput = document.getElementById('pageNumber');
                    var numPagesEl = document.getElementById('numPages');
                    var isUserEditing = false;

                    if (pageInput) {
                        pageInput.addEventListener('focus', function() { isUserEditing = true; });
                        pageInput.addEventListener('blur', function() { isUserEditing = false; });
                    }

                    var updatePageDisplay = function(currentPage) {
                        if (isUserEditing) return;
                        var relPage = currentPage - validStart + 1;
                        if (pageInput) { pageInput.value = relPage; pageInput.max = chapterLength; pageInput.min = 1; }
                        if (numPagesEl) numPagesEl.textContent = 'of ' + chapterLength;
                    };
                    updatePageDisplay(validStart);

                    // Navigation guard
                    // On first load, pdf.js may override our app.page call
                    // (e.g. restoring last viewed page). So we silently redirect
                    // the first time without showing any card. Cards only appear
                    // for subsequent (user-initiated) out-of-range navigation.
                    var initialNav = true;
                    
                    app.eventBus.on('pagechanging', function(evt) {
                        var page = evt.pageNumber;
                        
                        if (page >= validStart && page <= validEnd) {
                            // Page is in range — everything is fine
                            initialNav = false;
                            updatePageDisplay(page);
                            return;
                        }
                        
                        if (initialNav) {
                            // First navigation is outside range — pdf.js overrode us.
                            // Silently redirect to chapter start, no card.
                            initialNav = false;
                            console.log('[DTL] Initial page ' + page + ' outside chapter range — silently redirecting to ' + validStart);
                            setTimeout(function() { app.page = validStart; updatePageDisplay(validStart); }, 50);
                            return;
                        }
                        
                        // User-initiated navigation outside range — show card
                        if (page < validStart) {
                            setTimeout(function() { app.page = validStart; updatePageDisplay(validStart); }, 0);
                            showEndCard('start');
                        } else if (page > validEnd) {
                            setTimeout(function() { app.page = validEnd; updatePageDisplay(validEnd); }, 0);
                            showEndCard('end');
                        }
                    });

                    // Handle manual page input
                    if (pageInput) {
                        pageInput.addEventListener('change', function(e) {
                            e.stopPropagation();
                            var relPage = parseInt(this.value, 10);
                            if (isNaN(relPage) || relPage < 1) {
                                app.page = validStart;
                            } else if (relPage > chapterLength) {
                                app.page = validEnd;
                                showEndCard('end');
                            } else {
                                app.page = validStart + relPage - 1;
                            }
                        }, true);
                    }

                    console.log('[DTL] Chapter restricted: pages ' + validStart + '-' + validEnd + ' (' + chapterLength + ' pages)');
                }
            }, 100);
            
        }

        enforceChapterRestrictions();
    })();
    </script>
